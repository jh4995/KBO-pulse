# ============================================================
# KBO 야구 팬 참여형 데이터 플랫폼 — Docker Compose
# ============================================================
# Node.js (Express) + PostgreSQL + Redis + Nginx + Prometheus + Grafana
# App 서버 2대 → 분산 락, Rate Limiting, 캐싱의 다중 서버 정당성 확보
# ============================================================

services:
  # ----------------------------------------------------------
  # App 서버 인스턴스 1
  # ----------------------------------------------------------
  app-1:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kbo-app-1
    environment:
      - NODE_ENV=development
      - APP_PORT=3000
      - APP_INSTANCE_ID=app-1
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kbo-network
    restart: unless-stopped

  # ----------------------------------------------------------
  # App 서버 인스턴스 2
  # ----------------------------------------------------------
  app-2:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kbo-app-2
    environment:
      - NODE_ENV=development
      - APP_PORT=3000
      - APP_INSTANCE_ID=app-2
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kbo-network
    restart: unless-stopped

  # ----------------------------------------------------------
  # Nginx — 리버스 프록시 + 라운드 로빈 로드밸런서
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: kbo-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-1
      - app-2
    networks:
      - kbo-network
    restart: unless-stopped

  # ----------------------------------------------------------
  # Redis 7 — 캐싱, 분산 락, 카운터, Sorted Set, Rate Limiting
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: kbo-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly no
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kbo-network
    restart: unless-stopped

  # ----------------------------------------------------------
  # PostgreSQL 16 — Redis 캐싱의 "느린 대조군"
  # pg_stat_statements 활성화, shared_buffers 제한
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: kbo-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c shared_buffers=128MB
      -c log_statement=none
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kbo-network
    restart: unless-stopped

  # ----------------------------------------------------------
  # Prometheus — 메트릭 수집
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: kbo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - kbo-network
    restart: unless-stopped

  # ----------------------------------------------------------
  # Grafana — 부하테스트 결과 시각화
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: kbo-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - kbo-network
    restart: unless-stopped

networks:
  kbo-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
